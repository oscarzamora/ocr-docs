# Extraction patterns for metadata
extraction_patterns:
  date_formats:
    - "%m/%d/%Y"
    - "%m-%d-%Y"
    - "%B %d, %Y"
    - "%b %d, %Y"
    - "%Y-%m-%d"
    - "%d/%m/%Y"

  # Priority-ordered labeled amount patterns (first match with a valid amount wins)
  amount_labels:
    - "total amount due"
    - "amount due"
    - "total due"
    - "inv total"
    - "invoice total"
    - "new balance"
    - "statement balance"
    - "balance due"
    - "payment due"
    - "net pay"
    # Spanish (Peruvian / Interbank AMEX)
    - "monto a pagar"
    - "saldo total"
    - "pago minimo"
    - "cuota minima"
    - "total a pagar"
    - "total"

  amount_regex: "(?:total|amount|balance|payment)[\\s\\$]*([\\d,\\.]+)"
  account_regex: "(?:account|account #|acct)[#\\s]*([\\d\\-]{4,})"

# OCR Engine settings
ocr_settings:
  pdf24_path: "C:\\Program Files\\PDF24\\pdf24-Ocr.exe"
  keepOriginal: true
  archiveFolder: "_processed-originals"

# Manifest settings
manifest:
  csv_path: "manifest.csv"
  jsonl_path: "manifest.jsonl"
  include_fields:
    - filename
    - category
    - issuer
    - owner
    - account
    - date
    - amount
    - ocr_confidence
    - routed_to
    - timestamp

history:
