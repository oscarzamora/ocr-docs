owners:
  - Default

route_templates:
  default: "{category}/{issuer}/{year}"
  Bills: "Bills/{issuer}/{year}"
  Credit Card Statements: "Credit Card Statements/{issuer}/{year}"
  Bank Account & Statements: "Bank Account & Statements/{issuer}/{year}"
  Mortgage & Home Equity Accounts: "Mortgage & Home Equity Accounts/{account}/{year}"
  Health Statements & Results: "Health Statements & Results/{year}"
  Insurance: "Insurance/{year}"
  Tax Returns: "Tax Returns/{year} Tax Return Related Documents"
  Paystubs: "Paystubs/{year}"
  Receipts: "Receipts/{year}"
  Notices: "Notices/{year}"
  Auto Documentation: "Auto Documentation"

min_classification_score: 2

monthly_categories:
  - Bills
  - Credit Card Statements
  - Mortgage & Home Equity Accounts
  - Bank Account & Statements

account_in_filename_categories:
  - Credit Card Statements
  - Mortgage & Home Equity Accounts

# Categories where amount should be excluded from file names.
no_amount_categories:
  - Tax Returns
  - Notices

doc_types:
  Bills: Monthly
  Credit Card Statements: Statement
  Bank Account & Statements: Statement
  Mortgage & Home Equity Accounts: Statement
  Health Statements & Results: EOB
  Insurance: Policy
  Tax Returns: Return
  Notices: Notice
  Paystubs: Paycheck
  Receipts: Receipt

known_issuers:
  bank of america: Bank of America
  chase: Chase
  amex: AMEX
  citibank: Citibank
  wells fargo: Wells Fargo
  discover: Discover
  allstate: Allstate
  geico: GEICO
  adp: ADP

categories:
  Credit Card Statements:
    - credit card
    - statement balance
    - minimum payment due
    - available credit

  Bills:
    - amount due
    - billing period
    - service address
    - due date

  Bank Account & Statements:
    - checking account
    - savings account
    - beginning balance
    - ending balance

  Mortgage & Home Equity Accounts:
    - mortgage
    - loan number
    - principal
    - escrow

  Health Statements & Results:
    - explanation of benefits
    - claim number
    - provider name

  Insurance:
    - policy number
    - deductible
    - premium

  Tax Returns:
    - form 1040
    - adjusted gross income
    - internal revenue service

  Paystubs:
    - earnings statement
    - pay period
    - net pay

  Receipts:
    - order number
    - order confirmation
    - subtotal

  Notices:
    - no action required
    - important notice
    - informational update

  Auto Documentation:
    - vehicle identification number
    - vin number
    - lease agreement
    - certificate of title
    - bill of sale
    - odometer disclosure
    - msrp
    - trade-in

extraction_patterns:
  date_formats:
    - "%m/%d/%Y"
    - "%m-%d-%Y"
    - "%B %d, %Y"
    - "%b %d, %Y"
    - "%Y-%m-%d"

  amount_labels:
    - total amount due
    - amount due
    - total due
    - statement balance
    - payment due
    - net pay
    - total

  amount_regex: "(?:total|amount|balance|payment)[\\s\\$]*([\\d,\\.]+)"
  account_regex: "(?:account|account #|acct)[#\\s]*([\\d\\-]{4,})"

ocr_settings:
  pdf24_path: "C:\\Program Files\\PDF24\\pdf24-Ocr.exe"
  keepOriginal: true
  archiveFolder: "_processed-originals"

manifest:
  csv_path: "manifest.csv"
  jsonl_path: "manifest.jsonl"
  include_fields:
    - filename
    - category
    - issuer
    - owner
    - account
    - date
    - amount
    - ocr_confidence
    - routed_to
    - timestamp

# Per-run history log (Markdown). Appended to after each `process` run.
# Three modes:
#   1. history.path set    -> single rolling file at that exact path
#   2. history.monthly true -> auto-rotate: <history.dir or output>/<YYYY.MM> - PROCESSED_PDFS.md
#   3. (defaults)          -> <output_dir>/PROCESSED_PDFS.md
# The bootstrap parser handles all three formats.
history:
  monthly: false
  # dir:  "C:\\Users\\<user>\\Documents\\__downloads__"
  # path: "C:\\Users\\<user>\\Documents\\PROCESSED_PDFS.md"

# Learning / feedback log (L1)
# Every confirmed, skipped, and rule-added decision is appended here as JSONL.
# It feeds future learning layers (YAML auto-tune, embeddings, LLM few-shot).
# Override location with OCR_FEEDBACK_LOG env var, or set feedback.path below.
# Default: ./data/_feedback/corrections.jsonl  (relative to your current
# working directory — typically the project folder when run from a clone).
# Bookkeeping is NEVER stored next to your filed Documents.
feedback:
  # path: "data/_feedback/corrections.jsonl"

  # SQLite embedding store (L3). Populated incrementally by
  # `ocr-router feedback embed`. Override location with OCR_EMBEDDINGS_DB env
  # var, or set feedback.embeddings_db below.
  # Default: sibling of the feedback log -> ./data/_feedback/examples.sqlite
  # embeddings_db: "data/_feedback/examples.sqlite"

# Local-first LLM classifier (L4). Off by default — your run is 100%
# deterministic until you flip enabled: true.
# Requires `ollama serve` running and the models pulled, e.g.:
#   ollama pull llama3.2:3b
#   ollama pull nomic-embed-text
llm:
  enabled: false
  # When LLM disagrees with keyword scoring, route the doc to HITL if the
  # LLM's own confidence is below this threshold.
  confidence_threshold: 0.6
  # Number of most-similar past confirmed decisions to inject into the prompt.
  # Set to 0 to disable few-shot.
  fewshot_k: 5
  local:
    model: "llama3.2:3b"          # any tagged Ollama chat model
    # host: "http://localhost:11434"
    timeout_s: 30
  embedder:
    model: "nomic-embed-text"
