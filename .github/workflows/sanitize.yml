name: sanitize

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  sanitize-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sanitize check
        run: python scripts/sanitize_check.py
